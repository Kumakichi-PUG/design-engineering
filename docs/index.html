<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #canvas-container {
      position: relative;
      width: 1920px;
      height: 1080px;
      max-width: 100vw;
      max-height: 100vh;
    }
    canvas {
      width: 100%;
      height: 100%;
    }

    /* コントロールバー（左上） */
    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    #controls button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      background: #ffffff;
      border: 2px solid #1a1a1a;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    #controls button:hover {
      background: #1a1a1a;
      color: #ffffff;
    }
    #controls button:disabled {
      opacity: 0.4;
      cursor: wait;
    }
    #controls button.active {
      background: #1a1a1a;
      color: #ffffff;
    }
  </style>
  <script type="module" crossorigin src="/design-engineering/interactive-visualizer/assets/index-C4PZCsC7.js"></script>
</head>
<body>
  <div id="canvas-container">
    <canvas id="visualizer" width="1920" height="1080"></canvas>
  </div>
  <div id="controls">
    <button id="mic-btn">MIC OFF</button>
    <button id="svg-btn">SVG Export</button>
  </div>
</body>
</html>
